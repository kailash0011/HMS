<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OPD Vitals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h3>Record Vitals</h3>
  <form id="vitalsForm">
    <input class="form-control mb-2" placeholder="Appointment ID" id="appointment_id" required>
    <input class="form-control mb-2" placeholder="BP (e.g. 120/80)" id="bp">
    <input class="form-control mb-2" placeholder="Temperature" id="temperature">
    <input class="form-control mb-2" placeholder="Weight (kg)" id="weight">
    <input class="form-control mb-2" placeholder="Pulse" id="pulse">
    <button class="btn btn-primary">Save</button>
  </form>

<script>
document.getElementById("vitalsForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const token = localStorage.getItem("token");

  const body = {
    appointment_id: document.getElementById("appointment_id").value,
    bp: document.getElementById("bp").value,
    temperature: document.getElementById("temperature").value,
    weight: document.getElementById("weight").value,
    pulse: document.getElementById("pulse").value
  };

  const res = await fetch("http://localhost:5000/api/opd/vitals", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
    body: JSON.stringify(body)
  });

  alert(res.ok ? "Vitals saved" : "Failed");
});
</script>
</body>
</html>
